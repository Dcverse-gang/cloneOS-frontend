services:
  - type: web
    name: cloneos-frontend
    runtime: static
    plan: free
    buildCommand: yarn install && yarn build
    staticPublishPath: build
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_BASE_URL
        sync: false
      - key: REACT_APP_RAZORPAY_KEY_ID
        sync: false
      - key: REACT_APP_TRAINING_API_URL
        sync: false
